<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AWS Project - A stunning black and orange themed web application.">
    <title>AWS Project Site</title>
    
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
        <div class="container-fluid px-4 px-lg-5">
            <!-- Logo -->
            <a class="navbar-brand logo-text" href="#">
                <i class="bi bi-cloud-lightning-fill text-orange me-2"></i><span class="text-white">AWS</span>
            </a>
            
            <!-- Mobile Toggle -->
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Navbar Links & Socials -->
            <div class="collapse navbar-collapse" id="navbarNav">
                
                <!-- Centered Links -->
                <ul class="navbar-nav mx-auto text-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#events">Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
                
                <!-- Right Aligned Social Icons -->
                <div class="d-flex justify-content-center justify-content-lg-end social-icons mt-3 mt-lg-0">
                    <a href="#" class="social-link" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="social-link" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
                    <a href="#" class="social-link" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="social-link" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="home" class="hero-section text-center d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="hero-content">
                <span class="badge bg-dark-orange mb-3 px-3 py-2 text-uppercase tracking-wider">Welcome</span>
                <h1 class="display-3 fw-bold mb-4">Discover <span class="text-orange highlight-text">AWS</span> Excellence</h1>
                <p class="lead text-gray mb-5 mx-auto" style="max-width: 600px;">Experience a seamlessly crafted website layout built with modern web technologies. Dynamic, responsive, and stunning.</p>
                
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-primary-custom px-4 py-3 fw-semibold">Get Started <i class="bi bi-arrow-right ms-2"></i></button>
                    <button class="btn btn-outline-custom px-4 py-3 fw-semibold" data-bs-toggle="modal" data-bs-target="#videoModal">
                        <i class="bi bi-play-circle-fill me-2"></i>Play Video
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Modal -->
    <div class="modal fade" id="videoModal" tabindex="-1" aria-labelledby="videoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-header border-0 pb-0 justify-content-end p-2">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="ratio ratio-16x9 rounded overflow-hidden shadow-lg border border-warning border-opacity-25" style="background: #000;">
                        <video id="projectVideo" controls autoplay>
                            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
